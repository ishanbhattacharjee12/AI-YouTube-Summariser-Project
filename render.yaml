services:
  - type: web
    name: youtube-summarizer-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGINS
        value: "https://my-vercel-url.vercel.app" # To be replaced by the user
      - key: OPENAI_API_KEY
        sync: false
