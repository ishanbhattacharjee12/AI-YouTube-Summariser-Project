<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Summarizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --card-strong: #222;
      --text: #fff;
      --muted: #aaa;
      --border: #303030;
      --red: #ff0000;
      --red-dark: #cc0000;
      --red-soft: rgba(255, 0, 0, 0.14);
      --danger: #ff4d4d;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    .logo {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4.7rem);
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 800;
    }

    .tagline {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .health {
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    main {
      display: grid;
      gap: 24px;
      padding-top: 28px;
    }

    .input-panel,
    .results-panel,
    .status-box,
    .error-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .input-panel {
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--border);
      background: #111;
      color: var(--text);
      border-radius: 6px;
      padding: 0 16px;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-soft);
    }

    button {
      min-height: 56px;
      border: 0;
      border-radius: 6px;
      padding: 0 22px;
      background: var(--red);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    button:hover {
      background: var(--red-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .secondary-button {
      background: var(--card-strong);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .secondary-button:hover {
      background: #2a2a2a;
    }

    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      padding: 0 4px 4px;
    }

    .loading.visible {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 850ms linear infinite;
    }

    .error-box {
      display: none;
      color: var(--danger);
      padding: 16px;
      border-color: rgba(255, 77, 77, 0.45);
      background: rgba(255, 77, 77, 0.08);
      font-weight: 600;
    }

    .error-box.visible {
      display: block;
    }

    .status-box {
      display: none;
      padding: 16px;
      color: #e8e8e8;
      line-height: 1.55;
    }

    .status-box.visible {
      display: block;
    }

    .status-box strong {
      color: var(--text);
    }

    .status-box .language-list {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .results-panel {
      display: none;
      overflow: hidden;
    }

    .results-panel.visible {
      display: block;
      animation: fadeIn 280ms ease both;
    }

    .video-summary {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 20px;
      padding: 20px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #080808;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .summary-head h2 {
      margin: 0 0 14px;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      background: var(--card-strong);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .chip.red {
      color: var(--text);
      background: var(--red-soft);
      border-color: rgba(255, 0, 0, 0.42);
    }

    .section {
      padding: 22px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: 0;
    }

    .section h3 {
      margin: 0 0 14px;
      font-size: 1rem;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--muted);
    }

    .quote {
      margin: 0;
      padding: 18px;
      border-radius: 8px;
      background: var(--red-soft);
      border: 1px solid rgba(255, 0, 0, 0.34);
      font-size: clamp(1.2rem, 3vw, 1.65rem);
      line-height: 1.45;
      font-style: italic;
      font-weight: 600;
    }

    .key-points,
    .takeaways {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .key-point {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #151515;
    }

    .timestamp {
      display: inline-flex;
      min-height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--red);
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      font-size: 0.86rem;
    }

    .point-text {
      margin: 0;
      color: #e8e8e8;
      line-height: 1.55;
    }

    .takeaway {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      color: #e8e8e8;
      line-height: 1.5;
    }

    .check {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: var(--text);
      background: var(--red);
      font-weight: 900;
      font-size: 0.85rem;
    }

    .copy-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .copy-status {
      color: var(--muted);
      align-self: center;
      min-height: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1120px);
        padding-top: 26px;
      }

      header,
      .input-panel,
      .video-summary {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .health {
        width: fit-content;
      }

      button {
        width: 100%;
      }

      .key-point {
        grid-template-columns: 1fr;
      }

      .timestamp {
        width: fit-content;
        padding: 0 12px;
      }

      .copy-row {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <h1 class="logo">▶ YT Summarizer</h1>
        <p class="tagline">Paste a URL. Get the gist.</p>
      </div>
      <div class="health">Local FastAPI app</div>
    </header>

    <main>
      <form class="input-panel" id="summaryForm">
        <input id="urlInput" type="text" placeholder="Paste YouTube URL here..." autocomplete="off" aria-label="YouTube URL">
        <button id="checkButton" class="secondary-button" type="button">Check subtitles</button>
        <button id="submitButton" type="submit">Summarize</button>
      </form>

      <div class="loading" id="loading">
        <span class="spinner" aria-hidden="true"></span>
        <span>Fetching transcript and summarizing...</span>
      </div>

      <div class="error-box" id="errorBox" role="alert"></div>
      <div class="status-box" id="statusBox" role="status"></div>

      <section class="results-panel" id="resultsPanel" aria-live="polite">
        <div class="video-summary">
          <img class="thumbnail" id="thumbnail" alt="YouTube video thumbnail">
          <div class="summary-head">
            <h2 id="titleGuess"></h2>
            <div class="chips">
              <span class="chip red" id="sentiment"></span>
              <span class="chip" id="readTime"></span>
              <span class="chip" id="processingTime"></span>
            </div>
          </div>
        </div>

        <div class="section">
          <h3>One-Liner</h3>
          <p class="quote" id="oneLiner"></p>
        </div>

        <div class="section">
          <h3>Key Points</h3>
          <ul class="key-points" id="keyPoints"></ul>
        </div>

        <div class="section">
          <h3>Takeaways</h3>
          <ol class="takeaways" id="takeaways"></ol>
        </div>

        <div class="section copy-row">
          <span class="copy-status" id="copyStatus"></span>
          <button id="copyButton" type="button">Copy Summary</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const form = document.getElementById("summaryForm");
    const input = document.getElementById("urlInput");
    const checkButton = document.getElementById("checkButton");
    const submitButton = document.getElementById("submitButton");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const statusBox = document.getElementById("statusBox");
    const resultsPanel = document.getElementById("resultsPanel");
    const thumbnail = document.getElementById("thumbnail");
    const titleGuess = document.getElementById("titleGuess");
    const sentiment = document.getElementById("sentiment");
    const readTime = document.getElementById("readTime");
    const processingTime = document.getElementById("processingTime");
    const oneLiner = document.getElementById("oneLiner");
    const keyPoints = document.getElementById("keyPoints");
    const takeaways = document.getElementById("takeaways");
    const copyButton = document.getElementById("copyButton");
    const copyStatus = document.getElementById("copyStatus");

    let latestSummary = null;

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      checkButton.disabled = isLoading;
      input.disabled = isLoading;
      loading.classList.toggle("visible", isLoading);
      submitButton.textContent = isLoading ? "Summarizing..." : "Summarize";
    }

    function setChecking(isChecking) {
      submitButton.disabled = isChecking;
      checkButton.disabled = isChecking;
      input.disabled = isChecking;
      checkButton.textContent = isChecking ? "Checking..." : "Check subtitles";
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("visible");
    }

    function clearError() {
      errorBox.textContent = "";
      errorBox.classList.remove("visible");
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.classList.remove("visible");
    }

    function timestampToSeconds(timestamp) {
      const parts = timestamp.split(":").map(Number);
      if (parts.length === 2) {
        return parts[0] * 60 + parts[1];
      }
      if (parts.length === 3) {
        return parts[0] * 3600 + parts[1] * 60 + parts[2];
      }
      return 0;
    }

    function isLikelyYouTubeInput(value) {
      const trimmed = value.trim();
      return /^[A-Za-z0-9_-]{11}$/.test(trimmed) || trimmed.includes("youtube.com") || trimmed.includes("youtu.be");
    }

    function validateInput() {
      const url = input.value.trim();
      clearError();
      clearStatus();

      if (!url) {
        showError("Paste a YouTube URL or video ID first.");
        return null;
      }

      if (!isLikelyYouTubeInput(url)) {
        showError("Enter a YouTube URL from youtube.com or youtu.be, or paste an 11-character video ID.");
        return null;
      }

      return url;
    }

    function renderTranscriptStatus(status) {
      const availability = status.available ? "Subtitles found" : "Subtitles unavailable";
      const selected = status.selected_language
        ? `<div><strong>Selected:</strong> ${status.selected_language} (${status.selected_language_code})${status.is_generated ? " auto-generated" : " manual"}${status.is_translated ? ", translated to English" : ""}</div>`
        : "";
      const languages = status.languages.length
        ? `<div class="language-list"><strong>Available tracks:</strong> ${status.languages.join("; ")}</div>`
        : "";

      statusBox.innerHTML = `<strong>${availability}.</strong> ${status.message}${selected}${languages}`;
      statusBox.classList.add("visible");
    }

    function renderSummary(summary) {
      latestSummary = summary;
      thumbnail.src = `https://img.youtube.com/vi/${summary.video_id}/hqdefault.jpg`;
      titleGuess.textContent = summary.title_guess;
      sentiment.textContent = summary.sentiment;
      readTime.textContent = `${summary.estimated_read_time_minutes} min read`;
      processingTime.textContent = `${summary.processing_time_seconds}s processed`;
      oneLiner.textContent = `“${summary.one_liner}”`;

      keyPoints.innerHTML = "";
      summary.key_points.forEach((item) => {
        const li = document.createElement("li");
        li.className = "key-point";

        const link = document.createElement("a");
        link.className = "timestamp";
        link.href = `https://youtube.com/watch?v=${summary.video_id}&t=${timestampToSeconds(item.timestamp)}`;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = item.timestamp;

        const text = document.createElement("p");
        text.className = "point-text";
        text.textContent = item.point;

        li.append(link, text);
        keyPoints.appendChild(li);
      });

      takeaways.innerHTML = "";
      summary.takeaways.forEach((takeaway) => {
        const li = document.createElement("li");
        li.className = "takeaway";

        const icon = document.createElement("span");
        icon.className = "check";
        icon.textContent = "✓";

        const text = document.createElement("span");
        text.textContent = takeaway;

        li.append(icon, text);
        takeaways.appendChild(li);
      });

      copyStatus.textContent = "";
      resultsPanel.classList.add("visible");
      resultsPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function formatSummaryForClipboard(summary) {
      const pointLines = summary.key_points.map((item) => `- ${item.timestamp}: ${item.point}`).join("\n");
      const takeawayLines = summary.takeaways.map((item, index) => `${index + 1}. ${item}`).join("\n");
      return `${summary.title_guess}\n\n${summary.one_liner}\n\nKey Points:\n${pointLines}\n\nTakeaways:\n${takeawayLines}`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const url = validateInput();
      copyStatus.textContent = "";

      if (!url) {
        return;
      }

      setLoading(true);

      try {
        const response = await fetch("/summarize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || data.detail || "Something went wrong while summarizing.");
        }

        renderSummary(data);
      } catch (error) {
        showError(error.message);
      } finally {
        setLoading(false);
      }
    });

    checkButton.addEventListener("click", async () => {
      const url = validateInput();
      copyStatus.textContent = "";

      if (!url) {
        return;
      }

      setChecking(true);

      try {
        const response = await fetch("/transcript-status", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || data.detail || "Could not check subtitle status.");
        }

        renderTranscriptStatus(data);
      } catch (error) {
        showError(error.message);
      } finally {
        setChecking(false);
      }
    });

    copyButton.addEventListener("click", async () => {
      if (!latestSummary) {
        return;
      }

      try {
        await navigator.clipboard.writeText(formatSummaryForClipboard(latestSummary));
        copyStatus.textContent = "Copied.";
      } catch (error) {
        copyStatus.textContent = "Copy failed.";
      }
    });
  </script>
</body>
</html>
